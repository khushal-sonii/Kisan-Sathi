
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KisanSathi - AI Crop Doctor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans Devanagari', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        emerald: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f0fdf4;
            -webkit-text-size-adjust: 100%;
        }
        
        body.dark {
            background-color: #020617;
        }

        #root {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        
        @keyframes drift {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.3; }
            50% { transform: translateY(-30px) rotate(15deg) scale(1.1); opacity: 0.6; }
            100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.3; }
        }
        .animate-drift {
            animation: drift 10s ease-in-out infinite;
        }

        @keyframes pollen {
            0% { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translate(100px, -100px); opacity: 0; }
        }
        .pollen-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fde047;
            border-radius: 50%;
            filter: blur(1px);
            pointer-events: none;
            animation: pollen 15s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scan {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, #10b981, transparent);
            animation: scan 2s ease-in-out infinite;
            box-shadow: 0 0 15px #10b981;
            z-index: 10;
        }

        .mesh-bg {
            background-color: #f0fdf4;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(52, 211, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(167, 243, 208, 0.2) 0px, transparent 50%);
        }
        .dark .mesh-bg {
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.08) 0px, transparent 50%);
        }

        .smooth-scroll {
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .smooth-scroll::-webkit-scrollbar {
            display: none;
        }
        
        body.modal-open .premium-bg-container {
            filter: blur(12px) brightness(0.7) !important;
            transition: filter 0.5s ease, brightness 0.5s ease;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="h-full bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300 overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
